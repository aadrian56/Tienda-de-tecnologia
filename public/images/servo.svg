<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Servo Body -->
  <rect x="25" y="30" width="50" height="45" rx="3" fill="#1e293b" />
  <!-- Mounting ears -->
  <rect x="15" y="35" width="10" height="8" rx="1" fill="#334155" />
  <rect x="75" y="35" width="10" height="8" rx="1" fill="#334155" />
  
  <!-- Brass gear shaft -->
  <circle cx="38" cy="30" r="8" fill="#d97706" />
  <circle cx="38" cy="30" r="4" fill="#fbbf24" />
  
  <!-- Servo arm (horn) -->
  <rect x="22" y="20" width="45" height="8" rx="4" fill="#cbd5e1" />
  <circle cx="38" cy="24" r="3.5" fill="#475569" />
  <circle cx="28" cy="24" r="1.5" fill="#475569" />
  <circle cx="48" cy="24" r="1.5" fill="#475569" />
  <circle cx="58" cy="24" r="1.5" fill="#475569" />
  
  <!-- Label -->
  <text x="50" y="60" font-family="'Roboto', sans-serif" font-size="6" font-weight="bold" fill="#ef4444" text-anchor="middle">MG996R</text>
  <text x="50" y="68" font-family="'Roboto', sans-serif" font-size="5" font-weight="bold" fill="white" text-anchor="middle">SERVO MOTOR</text>
</svg>
