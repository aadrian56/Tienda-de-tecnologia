<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Red PCB Base -->
  <rect x="15" y="15" width="70" height="70" rx="4" fill="#b91c1c" />
  
  <!-- Heatsink (large black rectangle with vertical fins) -->
  <rect x="30" y="25" width="40" height="25" fill="#1e293b" rx="2" />
  <!-- Fins -->
  <rect x="34" y="20" width="4" height="10" fill="#0f172a" />
  <rect x="42" y="20" width="4" height="10" fill="#0f172a" />
  <rect x="50" y="20" width="4" height="10" fill="#0f172a" />
  <rect x="58" y="20" width="4" height="10" fill="#0f172a" />
  <rect x="66" y="20" width="4" height="10" fill="#0f172a" />
  
  <!-- Chip inside heatsink (L298N) -->
  <rect x="35" y="32" width="30" height="5" fill="#475569" />
  
  <!-- Blue Terminal Blocks -->
  <rect x="18" y="65" width="16" height="14" fill="#1d4ed8" rx="1" />
  <rect x="66" y="65" width="16" height="14" fill="#1d4ed8" rx="1" />
  <rect x="42" y="65" width="16" height="14" fill="#1d4ed8" rx="1" />
  
  <!-- Screws on blocks -->
  <circle cx="22" cy="72" r="2" fill="#94a3b8" />
  <circle cx="30" cy="72" r="2" fill="#94a3b8" />
  <circle cx="70" cy="72" r="2" fill="#94a3b8" />
  <circle cx="78" cy="72" r="2" fill="#94a3b8" />
  
  <!-- Text Label -->
  <text x="50" y="58" font-family="'Roboto', sans-serif" font-size="6" font-weight="bold" fill="white" text-anchor="middle">L298N</text>
  <text x="50" y="80" font-family="'Roboto', sans-serif" font-size="4" font-weight="bold" fill="#03DAC6" text-anchor="middle">DUAL H-BRIDGE</text>
</svg>
