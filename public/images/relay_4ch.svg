  <circle cx="22" cy="70" r="1.5" fill="#e2e8f0" />
  <circle cx="32" cy="70" r="1.5" fill="#e2e8f0" />
  <circle cx="42" cy="70" r="1.5" fill="#e2e8f0" />
  <circle cx="52" cy="70" r="1.5" fill="#e2e8f0" />
